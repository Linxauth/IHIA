// DETECTOR
// ══════════════════════════════════════════════════════════════
// Verifica se o padrão existe como palavra (ou fragmento de frase) no texto
// Padrões com espaço ou com mais de 6 chars: includes simples
// Padrões curtos (palavra isolada): exige boundary (espaço, pontuação ou início/fim)
function matchPattern(lo, p) {
  if (!lo.includes(p)) return false;
  // Padrão contém espaço ou é longo — includes já é suficiente
  if (p.includes(" ") || p.length > 7) return true;
  // Palavra curta — verifica se está delimitada
  const re = new RegExp("(^|[\\s,\\.!?;:\\(\\)])" + p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "([\\s,\\.!?;:\\(\\)]|$)", "i");
  return re.test(lo);
}

function detect(text) {
  if (!text || text.trim().length < 3) return null;
  const lo = text.toLowerCase();
  const matched = [];
  for (const trigger of TRIGGER_MAP) {
    for (const p of trigger.patterns) {
      if (matchPattern(lo, p)) { matched.push(trigger); break; }
    }
  }
  if (matched.length === 0) return null;
  const priority = ["S.A.S.E.", "MIDESA", "A.P.L."];
  matched.sort((a, b) => {
    const ai = priority.findIndex(p => a.method.includes(p));
    const bi = priority.findIndex(p => b.method.includes(p));
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  return matched[0];
}

// ══════════════════════════════════════════════════════════════
// RESPIRAÇÃO GUIADA 4-4-4 — Lin X
// ══════════════════════════════════════════════════════════════
function RespiraGuiada() {
  const [ativo, setAtivo] = useState(false);
  const [fase, setFase] = useState("inspirar");
  const [segundos, setSegundos] = useState(4);
  const [progresso, setProgresso] = useState(0);

  useEffect(() => {
    if (!ativo) return;
    const interval = setInterval(() => {
      setSegundos(prev => {
        if (prev === 1) {
          setFase(f => f === "inspirar" ? "segurar" : f === "segurar" ? "expirar" : "inspirar");
          return 4;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [ativo]);

  // Progresso calculado separadamente para evitar dependência circular
  useEffect(() => {
    const step = (4 - segundos) / 4;
    if (fase === "inspirar")  setProgresso(step);
    else if (fase === "expirar") setProgresso(1 - step);
    else setProgresso(1);
  }, [segundos, fase]);

  const tamanho = 60 + progresso * 80;
  const cor = "#9b8ec2";

  return (
    <div style={{ textAlign: "center", marginTop: "24px" }}>
      {!ativo ? (
        <button onClick={() => setAtivo(true)} style={{
          background: "none", border: `1px solid ${cor}66`, borderRadius: "30px",
          color: cor, fontFamily: "'Courier Prime', monospace",
          fontSize: "11px", padding: "6px 16px", cursor: "pointer", letterSpacing: "0.1em",
        }}>
          ◌ respiração 4-4-4
        </button>
      ) : (
        <div>
          <div style={{
            width: `${tamanho}px`, height: `${tamanho}px`, borderRadius: "50%",
            background: cor, opacity: 0.6 + progresso * 0.3,
            margin: "0 auto 12px auto", transition: "all 0.8s ease-out",
            boxShadow: `0 0 12px ${cor}44`,
          }} />
          <div style={{
            fontFamily: "'Courier Prime', monospace", fontSize: "12px",
            color: cor, letterSpacing: "0.1em", textTransform: "uppercase",
          }}>
            {fase} {segundos}s
          </div>
          <button onClick={() => { setAtivo(false); setFase("inspirar"); setSegundos(4); setProgresso(0); }}
            style={{ background: "none", border: "none", color: "#333", fontFamily: "'Courier Prime', monospace", fontSize: "9px", cursor: "pointer", marginTop: "8px", letterSpacing: "0.1em" }}>
            parar
          </button>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ANCORA MIDESA — técnica 5-4-3-2-1, círculos sequenciais (MIDESA)
// ══════════════════════════════════════════════════════════════
const ANCORA_SENTIDOS = [
  { num: 5, sentido: "VISÃO",    instrucao: "Observe ao seu redor e nomeie cinco coisas que você pode ver.",  tempo: 25000 },
  { num: 4, sentido: "TATO",     instrucao: "Sinta e toque em quatro coisas ao seu redor.",                   tempo: 20000 },
  { num: 3, sentido: "AUDIÇÃO",  instrucao: "Concentre-se em três sons que pode ouvir.",                      tempo: 15000 },
  { num: 2, sentido: "OLFATO",   instrucao: "Identifique dois cheiros que consegue sentir.",                   tempo: 10000 },
  { num: 1, sentido: "PALADAR",  instrucao: "Perceba um gosto na boca.",                                       tempo:  5000 },
];
const ANCORA_COR = "#6a7a9a";

function AncoraMIDESA() {
  const [ativo, setAtivo] = useState(false);
  const [passo, setPasso] = useState(0);
  const [concluido, setConcluido] = useState(false);
  const [progresso, setProgresso] = useState(0);

  const tempoAtual = ANCORA_SENTIDOS[passo].tempo;

  useEffect(() => {
    if (!ativo || concluido) return;
    setProgresso(0);
    const inicio = Date.now();
    const animId = setInterval(() => {
      const elapsed = Date.now() - inicio;
      setProgresso(Math.min(elapsed / tempoAtual, 1));
    }, 50);
    const t = setTimeout(() => {
      clearInterval(animId);
      setProgresso(1);
      if (passo < ANCORA_SENTIDOS.length - 1) {
        setPasso(p => p + 1);
      } else {
        setConcluido(true);
      }
    }, tempoAtual);
    return () => { clearTimeout(t); clearInterval(animId); };
  }, [ativo, passo, concluido, tempoAtual]);

  function reiniciar() { setAtivo(false); setPasso(0); setConcluido(false); setProgresso(0); }

  const atual = ANCORA_SENTIDOS[passo];
  const raio = 42;
  const circunf = 2 * Math.PI * raio;
  const dashOffset = circunf * (1 - progresso);

  return (
    <div style={{ textAlign: "center", marginTop: "24px" }}>
      {!ativo ? (
        <button onClick={() => setAtivo(true)} style={{
          background: "none", border: `1px solid ${ANCORA_COR}55`, borderRadius: "30px",
          color: ANCORA_COR, fontFamily: "'Courier Prime', monospace",
          fontSize: "11px", padding: "6px 18px", cursor: "pointer", letterSpacing: "0.1em",
        }}>
          ancoragem — 5 sentidos
        </button>
      ) : concluido ? (
        <div>
          <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "11px", color: ANCORA_COR, letterSpacing: "0.08em", lineHeight: "1.9", marginBottom: "14px" }}>
            ◆ Âncora concluída.<br />
            Retorne à decisão com presença plena.
          </div>
          <button onClick={reiniciar} style={{ background: "none", border: `1px solid ${ANCORA_COR}44`, borderRadius: "20px", color: ANCORA_COR, fontFamily: "'Courier Prime', monospace", fontSize: "10px", padding: "5px 14px", cursor: "pointer", letterSpacing: "0.1em" }}>
            repetir
          </button>
        </div>
      ) : (
        <div>
          {/* Círculo de progresso com número e sentido */}
          <div style={{ position: "relative", width: "100px", height: "100px", margin: "0 auto 16px" }}>
            <svg width="100" height="100" style={{ position: "absolute", top: 0, left: 0 }}>
              {/* Trilha */}
              <circle cx="50" cy="50" r={raio} fill="none" stroke="#1a1a1a" strokeWidth="3" />
              {/* Progresso */}
              <circle cx="50" cy="50" r={raio} fill="none"
                stroke={ANCORA_COR} strokeWidth="3"
                strokeDasharray={circunf}
                strokeDashoffset={dashOffset}
                strokeLinecap="round"
                transform="rotate(-90 50 50)"
                style={{ transition: "stroke-dashoffset 0.05s linear" }}
              />
            </svg>
            {/* Número central */}
            <div style={{
              position: "absolute", top: "50%", left: "50%",
              transform: "translate(-50%, -50%)",
              display: "flex", flexDirection: "column", alignItems: "center",
              lineHeight: 1,
            }}>
              <div style={{ fontFamily: "'IM Fell English', serif", fontSize: "30px", color: ANCORA_COR }}>
                {atual.num}
              </div>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "9px", color: ANCORA_COR + "88", letterSpacing: "0.04em", marginTop: "2px" }}>
                {Math.ceil((1 - progresso) * tempoAtual / 1000)}s
              </div>
            </div>
          </div>

          {/* Nome do sentido */}
          <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "10px", color: ANCORA_COR, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: "10px" }}>
            {atual.sentido}
          </div>

          {/* Instrução */}
          <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "12px", color: "#444", lineHeight: "1.7", maxWidth: "260px", margin: "0 auto 14px", letterSpacing: "0.02em" }}>
            {atual.instrucao}
          </div>

          {/* Indicador de passo */}
          <div style={{ display: "flex", gap: "6px", justifyContent: "center", marginBottom: "12px" }}>
            {ANCORA_SENTIDOS.map((_, i) => (
              <div key={i} style={{
                width: "6px", height: "6px", borderRadius: "50%",
                background: i < passo ? ANCORA_COR : i === passo ? ANCORA_COR : "#1a1a1a",
                opacity: i <= passo ? 1 : 0.3,
                transition: "all 0.3s",
              }} />
            ))}
          </div>

          <button onClick={reiniciar} style={{ background: "none", border: "none", color: "#555", fontFamily: "'Courier Prime', monospace", fontSize: "9px", cursor: "pointer", letterSpacing: "0.08em" }}>
            parar
          </button>
        </div>
      )}
    </div>
  );
}

const STORAGE_KEYS = { DIARY: "ihia_diary", OFFSETS: "ihia_question_offsets" };

function loadDiary() {
  try { const s = localStorage.getItem(STORAGE_KEYS.DIARY); return s ? JSON.parse(s) : []; }

}
function saveDiary(diary) {
  try { localStorage.setItem(STORAGE_KEYS.DIARY, JSON.stringify(diary)); } catch {}
}

// SCALE BAR — CORREÇÃO 2: movida para fora do componente
// CORREÇÃO 3: cálculo de pct corrigido (parênteses explícitos)
// ══════════════════════════════════════════════════════════════
function ScaleBar({ label, count, total, color }) {
  const base = Math.max(total, 1);
  const pct = Math.min(Math.round((count / base) * 100), 100);
  let note = "";
  if (count === 0)   note = "não ativado ainda";
  else if (pct > 50) note = "área predominante";
  else if (pct > 25) note = "área ativa";
  else               note = "área em desenvolvimento";

  return (
    <div style={{ marginBottom: "20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
        <span style={{ fontSize: "10px", color, letterSpacing: "0.12em", textTransform: "uppercase", fontFamily: "'Courier Prime', monospace" }}>{label}</span>
        <span style={{ fontSize: "10px", color: "#333", fontFamily: "'Courier Prime', monospace" }}>{count} pergunta{count !== 1 ? "s" : ""} · {note}</span>
      </div>
      <div style={{ height: "2px", background: "#1a1a1a", borderRadius: "1px", overflow: "hidden" }}>
        <div style={{ height: "100%", width: pct + "%", background: color, borderRadius: "1px", transition: "width 1s cubic-bezier(.4,0,.2,1)" }} />
      </div>
    </div>
  );
}

// CORREÇÃO 4: getDiagnosis movida para fora do componente
function getDiagnosis(sase, midesa, apl, total) {
  if (total < 3) return "Responda mais perguntas para gerar o seu diagnóstico.";
  const dominant = Object.entries({ "S.A.S.E.": sase, "MIDESA": midesa, "A.P.L.": apl })
    .sort((a, b) => b[1] - a[1])[0][0];
  const msgs = {
    "S.A.S.E.": "Seu padrão predominante é emocional. A emoção está presente antes da análise. Trabalhe o reconhecimento antes de agir.",
    "MIDESA":   "Seu padrão predominante é estratégico. Você tende a agir sem mapear completamente o campo. Valide antes de executar.",
    "A.P.L.":   "Seu padrão predominante é cognitivo. Você questiona pressupostos e conclusões. Cuidado com paralisia por análise.",
  };
  return msgs[dominant] || "Continue respondendo para revelar seu padrão predominante.";
}

// ══════════════════════════════════════════════════════════════
// COMPONENTE PRINCIPAL
// ══════════════════════════════════════════════════════════════
const PAUSE_MS = 2000;

function IHIAApp() {
  const [view, setView]                 = useState("editor");
  const [text, setText]                 = useState("");
  const [currentQuestions, setCurrentQuestions] = useState([]);
  const [currentMethod, setCurrentMethod]       = useState("");
  const [currentLayer, setCurrentLayer]         = useState("");
  const [selectedIdx, setSelectedIdx]           = useState(0);
  const [open, setOpen]                 = useState(false);
  const [shown, setShown]               = useState(0);
  const [diary, setDiary]               = useState(() => loadDiary());
  const [activeEntry, setActiveEntry]   = useState(null);
  const [answerText, setAnswerText]     = useState("");
  const [confirmClear, setConfirmClear] = useState(false);
  const [showAbout, setShowAbout]       = useState(false);
  const [activeContext, setActiveContext] = useState(null);

  const timer          = useRef(null);
  const taRef          = useRef(null);
  const textRef        = useRef("");   // ref para captura de contexto sem stale closure
  // CORREÇÃO 1: questionOffset inicializado com loadOffsets()
  const questionOffset = useRef(loadOffsets());

  // Persiste diário sempre que muda
  useEffect(() => { saveDiary(diary); }, [diary]);

  // Cleanup: cancela timer pendente ao desmontar o componente
  useEffect(() => {
    return () => { clearTimeout(timer.current); };
  }, []);

  // CORREÇÃO 1: salva offsets usando função, não dependência de ref
  // Refs não disparam re-renders — salvamos manualmente em showQuestions
  const showQuestions = useCallback((val) => {
    const result = detect(val);
    if (!result) return;
    const offset = questionOffset.current[result.layer] || 0;
    const allQ   = result.questions;
    const sliced = allQ.slice(offset, offset + 3);
    const questions = sliced.length >= 1 ? sliced : allQ.slice(0, 3);
    questionOffset.current[result.layer] = (offset + 3) % allQ.length;
    saveOffsets(questionOffset.current); // salva imediatamente após atualizar
    setCurrentQuestions(questions);
    setCurrentMethod(result.method);
    setCurrentLayer(result.layer);
    setSelectedIdx(-1);
    setOpen(true);
    setShown(s => s + 1);
  }, []);

  const acceptQuestion = useCallback((idx) => {
    if (currentQuestions.length === 0) return;
    const i = (idx !== undefined) ? idx : selectedIdx;
    const chosen = currentQuestions[i] || currentQuestions[0];
    // Usa ref para capturar texto no momento exato da detecção, sem stale closure
    const rawText = textRef.current.trim();
    const entry = {
      id: Date.now(),
      question: chosen,
      method: currentMethod,
      layer: currentLayer,
      date: new Date().toLocaleDateString("pt-BR"),
      time: new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }),
      answer: "",
      answered: false,
    };
    if (rawText.length > 0) {
      entry.context = rawText.slice(0, 1500);
    }
    setDiary(prev => [entry, ...prev]);
    setOpen(false);
    setCurrentQuestions([]);
    setTimeout(() => taRef.current?.focus(), 20);
  }, [currentQuestions, selectedIdx, currentMethod, currentLayer]);

  const handleChange = useCallback((e) => {
    const val = e.target.value;
    setText(val);
    textRef.current = val;   // mantém ref sincronizada para captura sem stale closure
    setOpen(false);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => showQuestions(val), PAUSE_MS);
  }, [showQuestions]);

  const handleKeyDown = useCallback((e) => {
    if (!open || currentQuestions.length === 0) return;
    if (e.key === "Tab")        { e.preventDefault(); acceptQuestion(selectedIdx < 0 ? 0 : selectedIdx); }
    else if (e.key === "ArrowDown") { e.preventDefault(); setSelectedIdx(p => p < 0 ? 0 : (p + 1) % currentQuestions.length); }
    else if (e.key === "ArrowUp")   { e.preventDefault(); setSelectedIdx(p => p < 0 ? currentQuestions.length - 1 : (p - 1 + currentQuestions.length) % currentQuestions.length); }
    else if (e.key === "Escape")    { setOpen(false); setCurrentQuestions([]); }
  }, [open, currentQuestions, acceptQuestion]);

  const saveAnswer = () => {
    if (!activeEntry || !answerText.trim()) return;
    setDiary(prev => prev.map(e =>
      e.id === activeEntry.id ? { ...e, answer: answerText.trim(), answered: true } : e
    ));
    setActiveEntry(null);
    setAnswerText("");
  };

  function clearHistory() {
    setDiary([]);
    setShown(0);
    setConfirmClear(false);
    questionOffset.current = {};
    saveOffsets({});
  }

  const wordsCount  = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
  const counts      = diary.reduce((acc, e) => { acc[e.method] = (acc[e.method] || 0) + 1; return acc; }, {});
  const saseCount   = counts["S.A.S.E."] || 0;
  const midesaCount = counts["MIDESA"]   || 0;
  const aplCount    = counts["A.P.L."]   || 0;
  const methodTotal = saseCount + midesaCount + aplCount; // exclui IHIA da escala
  const pending     = diary.filter(e => !e.answered).length;
  const answered    = diary.filter(e => e.answered).length;

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 20px", fontFamily: "'Georgia', serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime&display=swap');
        .ta, .ta-answer {
          width: 100%; background: #111; border: 1px solid #2a2a2a;
          border-radius: 4px; color: #e8e8e8; caret-color: #c0c0c0;
          font-family: 'Courier Prime', monospace; font-size: 15px; line-height: 1.9;
          padding: 24px; resize: none; outline: none; display: block;
          transition: border-color .3s;
        }
        .ta { min-height: 280px; }
        .ta-answer { min-height: 120px; }
        .ta::placeholder, .ta-answer::placeholder { color: #555; }
        .ta:focus, .ta-answer:focus { border-color: #444; }
        .tab-btn {
          background: none; border: none; border-bottom: 2px solid transparent;
          color: #333; font-family: 'Courier Prime', monospace; font-size: 11px;
          letter-spacing: 0.12em; text-transform: uppercase;
          padding: 8px 16px; cursor: pointer; transition: all .2s;
        }
        .tab-btn.on { color: #c8c8c8; border-bottom-color: #444; }
        .tab-btn:hover:not(.on) { color: #666; }
        .q-panel {
          background: #111; border-left: 3px solid #2a2a2a;
          padding: 16px 20px; margin-top: 10px;
          font-family: 'Courier Prime', monospace; cursor: pointer;
          transition: border-left-color 0.2s; width: 100%; max-width: 720px;
        }
        .q-panel:hover { border-left-color: #555; }
        .q-text { font-size: 14px; line-height: 1.7; color: #555; padding: 5px 8px; margin-bottom: 3px; }
        .q-text.sel { border-left: 2px solid #c0c0c0; background: #1a1a1a; color: #e0e0e0; padding-left: 10px; }
        .q-hint { font-size: 9px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 10px; }
        .entry-card {
          background: #111; border: 1px solid #1e1e1e; border-radius: 3px;
          padding: 18px 20px; margin-bottom: 10px;
          font-family: 'Courier Prime', monospace; cursor: pointer; transition: border-color .2s;
        }
        .entry-card:hover { border-color: #555; }
        .entry-card.answered { opacity: 0.45; cursor: default; }
        .btn-primary {
          background: none; border: 1px solid #333; color: #888;
          font-family: 'Courier Prime', monospace; font-size: 10px;
          letter-spacing: 0.1em; text-transform: uppercase;
          padding: 6px 16px; cursor: pointer; border-radius: 2px; transition: all .2s;
        }
        .btn-primary:hover { border-color: #888; color: #c8c8c8; }
        .badge {
          display: inline-block; font-size: 8px; letter-spacing: 0.1em;
          text-transform: uppercase; padding: 2px 8px; border-radius: 2px;
          font-family: 'Courier Prime', monospace; margin-right: 8px;
        }
      `}</style>

      {/* Header */}
      <div style={{ width: "100%", maxWidth: "720px", display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: "8px" }}>
        <div>
          <div style={{ fontFamily: "'IM Fell English', serif", fontSize: "26px", color: "#c8c8c8", letterSpacing: "0.06em", fontWeight: "normal" }}>IHIA</div>

        </div>
        <div style={{ fontSize: "10px", color: "#555", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.06em" }}>
          {wordsCount} pal. · {shown} perguntas · {pending} pendentes
        </div>
      </div>

      {/* Tabs */}
      <div style={{ width: "100%", maxWidth: "720px", borderBottom: "1px solid #1a1a1a", marginBottom: "24px", display: "flex" }}>
        <button className={`tab-btn${view === "editor" ? " on" : ""}`} onClick={() => setView("editor")}>Escrita</button>
        <button className={`tab-btn${view === "diary"  ? " on" : ""}`} onClick={() => setView("diary")}>
          Perguntas aceitas{diary.length > 0 ? ` · ${diary.length}` : ""}
        </button>
      </div>

      {/* ── EDITOR ── */}
      {view === "editor" && (
        <>
          <textarea
            ref={taRef}
            className="ta"
            style={{ width: "100%", maxWidth: "720px" }}
            value={text}
            onChange={handleChange}
            onKeyDown={handleKeyDown}
            placeholder="Escreva algo. Quando pausar, o método mostrará perguntas."
            spellCheck={false}
          />

          {open && currentQuestions.length > 0 && (
            <div className="q-panel">
              <FrameworkHeader method={currentMethod} />
              {currentQuestions.map((q, idx) => (
                <div
                  key={idx}
                  className={`q-text${idx === selectedIdx ? " sel" : ""}`}
                  onClick={() => acceptQuestion(idx)}
                  onMouseEnter={() => setSelectedIdx(idx)}
                  onMouseLeave={() => setSelectedIdx(-1)}
                >
                  {idx === selectedIdx ? "→ " : "   "}{q}
                </div>
              ))}
              <div className="q-hint">Tab · aceitar &nbsp;·&nbsp; ↑↓ navegar &nbsp;·&nbsp; Esc fechar</div>
            </div>
          )}

          <div
            onClick={() => setShowAbout(true)}
            style={{ width: "100%", maxWidth: "720px", marginTop: "32px", paddingTop: "18px", borderTop: "1px solid #141414", fontSize: "10px", color: "#555", fontFamily: "'Courier Prime', monospace", textAlign: "center", letterSpacing: "0.06em", cursor: "pointer", transition: "color .3s" }}
            onMouseEnter={e => e.currentTarget.style.color = "#444"}
            onMouseLeave={e => e.currentTarget.style.color = "#1e1e1e"}
          >
            O método que expande a inteligência.
          </div>
        </>
      )}

      {/* ── DIÁRIO ── */}
      {view === "diary" && (
        <div style={{ width: "100%", maxWidth: "720px" }}>

          {/* Painel de autoconhecimento */}
          <div style={{ background: "#0e0e0e", border: "1px solid #1a1a1a", borderRadius: "3px", padding: "24px", marginBottom: "24px" }}>
            <div style={{ fontFamily: "'IM Fell English', serif", fontSize: "15px", color: "#555", marginBottom: "6px", fontWeight: "normal" }}>
              Painel de autoconhecimento
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
              <div style={{ fontSize: "10px", color: "#555", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.06em" }}>
                {diary.length} aceita{diary.length !== 1 ? "s" : ""} · {answered} respondida{answered !== 1 ? "s" : ""} · {pending} pendente{pending !== 1 ? "s" : ""}
              </div>
              {diary.length > 0 && !confirmClear && (
                <button onClick={() => setConfirmClear(true)} style={{
                  background: "none", border: "1px solid #2a2a2a", borderRadius: "2px",
                  color: "#555", fontFamily: "'Courier Prime', monospace",
                  fontSize: "9px", padding: "3px 10px", cursor: "pointer",
                  letterSpacing: "0.1em", textTransform: "uppercase", transition: "all .2s",
                }}>limpar histórico</button>
              )}
              {confirmClear && (
                <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
                  <span style={{ fontSize: "9px", color: "#444", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.06em" }}>confirmar?</span>
                  <button onClick={clearHistory} style={{
                    background: "none", border: "1px solid #7a3a3a", borderRadius: "2px",
                    color: "#7a3a3a", fontFamily: "'Courier Prime', monospace",
                    fontSize: "9px", padding: "3px 10px", cursor: "pointer",
                    letterSpacing: "0.1em", textTransform: "uppercase",
                  }}>sim</button>
                  <button onClick={() => setConfirmClear(false)} style={{
                    background: "none", border: "1px solid #2a2a2a", borderRadius: "2px",
                    color: "#333", fontFamily: "'Courier Prime', monospace",
                    fontSize: "9px", padding: "3px 10px", cursor: "pointer",
                    letterSpacing: "0.1em", textTransform: "uppercase",
                  }}>não</button>
                </div>
              )}
            </div>

            <ScaleBar label="S.A.S.E. — Emoção"       count={saseCount}   total={methodTotal} color="#9b8ec2" />
            <ScaleBar label="MIDESA — Estratégia"      count={midesaCount} total={methodTotal} color="#6a7a9a" />
            <ScaleBar label="A.P.L. — Metacognição"    count={aplCount}    total={methodTotal} color="#8a7a6a" />

            {diary.length >= 3 && (
              <div style={{ marginTop: "16px", padding: "14px 16px", background: "#0a0a0a", border: "1px solid #141414", borderRadius: "2px", fontSize: "12px", color: "#3a3a3a", fontFamily: "'Courier Prime', monospace", fontStyle: "italic", lineHeight: "1.7" }}>
                ◆ {getDiagnosis(saseCount, midesaCount, aplCount, diary.length)}
              </div>
            )}
          </div>

          {/* Lista */}
          {diary.length === 0 ? (
            <div style={{ fontSize: "12px", color: "#555", fontFamily: "'Courier Prime', monospace", textAlign: "center", padding: "40px 0", lineHeight: "2", letterSpacing: "0.06em" }}>
              Nenhuma pergunta aceita ainda.<br />
              Escreva na aba Escrita e aceite com Tab.
            </div>
          ) : (
            diary.map(entry => {
              const fw = getFrameworkInfo(entry.method);
              return (
                <div
                  key={entry.id}
                  className={`entry-card${entry.answered ? " answered" : ""}`}
                  onClick={() => { if (!entry.answered) { setActiveEntry(entry); setAnswerText(entry.answer || ""); } }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}>
                    <span className="badge" style={{ background: fw.color + "18", color: fw.color, border: `1px solid ${fw.color}33` }}>
                      {entry.method}
                    </span>
                    <span style={{ fontSize: "9px", color: "#555", fontFamily: "'Courier Prime', monospace" }}>
                      {entry.date} {entry.time}
                    </span>
                  </div>
                  <div style={{ fontSize: "14px", color: entry.answered ? "#333" : "#888", lineHeight: "1.7" }}>
                    {entry.question}
                  </div>
                  {entry.answered && entry.answer && (
                    <div style={{ fontSize: "12px", color: "#555", fontStyle: "italic", lineHeight: "1.6", marginTop: "8px", paddingTop: "8px", borderTop: "1px solid #1a1a1a" }}>
                      {entry.answer}
                    </div>
                  )}
                  {!entry.answered && (
                    <div style={{ fontSize: "9px", color: "#555", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: "10px" }}>
                      clique para responder →
                    </div>
                  )}
                  {entry.context && (
                    <div
                      onClick={e => { e.stopPropagation(); setActiveContext(entry.context); }}
                      style={{ fontSize: "9px", color: "#444", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.08em", marginTop: "8px", cursor: "pointer", display: "inline-block" }}
                      onMouseEnter={e => e.currentTarget.style.color = "#888"}
                      onMouseLeave={e => e.currentTarget.style.color = "#444"}
                    >
                      ver contexto original →
                    </div>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}

      {/* Modal de contexto original — independente do modal de resposta */}
      {activeContext && (
        <div
          onClick={() => setActiveContext(null)}
          style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", zIndex: 110 }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{ background: "#0e0e0e", border: "1px solid #2a2a2a", borderRadius: "4px", padding: "28px", width: "100%", maxWidth: "600px", maxHeight: "80vh", display: "flex", flexDirection: "column" }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
              <div style={{ fontSize: "9px", color: "#444", fontFamily: "'Courier Prime', monospace", letterSpacing: "0.16em", textTransform: "uppercase" }}>
                contexto original
              </div>
              <button
                onClick={() => setActiveContext(null)}
                style={{ background: "none", border: "none", color: "#333", fontFamily: "'Courier Prime', monospace", fontSize: "16px", cursor: "pointer", lineHeight: 1 }}
              >×</button>
            </div>
            <div style={{ overflowY: "auto", flex: 1 }}>
              <div style={{ fontSize: "13px", color: "#666", fontFamily: "'Courier Prime', monospace", lineHeight: "1.9", whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
                {activeContext}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Modal de resposta */}
      {activeEntry && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000cc", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", zIndex: 100 }}>
          <div style={{ background: "#0e0e0e", border: "1px solid #2a2a2a", borderRadius: "4px", padding: "28px", width: "100%", maxWidth: "600px" }}>
            <div style={{ fontSize: "9px", color: getFrameworkInfo(activeEntry.method).color, letterSpacing: "0.16em", textTransform: "uppercase", fontFamily: "'Courier Prime', monospace", marginBottom: "14px" }}>
              ◆ {activeEntry.method} — reflexão
            </div>
            <div style={{ fontSize: "15px", color: "#aaa", lineHeight: "1.7", fontFamily: "'Courier Prime', monospace", marginBottom: "18px" }}>
              {activeEntry.question}
            </div>
            <textarea
              className="ta-answer"
              value={answerText}
              onChange={e => setAnswerText(e.target.value)}
              placeholder="Escreva sua reflexão aqui…"
              autoFocus
            />
            {activeEntry.method === "S.A.S.E." && <RespiraGuiada />}
            {activeEntry.method === "MIDESA"   && <AncoraMIDESA />}
            {activeEntry.method === "A.P.L."   && <Tratak />}
            <div style={{ display: "flex", gap: "10px", marginTop: "14px", justifyContent: "flex-end" }}>
              <button className="btn-primary" onClick={() => { setActiveEntry(null); setAnswerText(""); }}>cancelar</button>
              <button className="btn-primary" style={{ borderColor: "#555", color: "#c8c8c8" }} onClick={saveAnswer}>salvar reflexão</button>
            </div>
          </div>
        </div>
      )}
      {/* Modal — sobre o app e o livro */}
      {showAbout && (
        <div
          onClick={() => setShowAbout(false)}
          style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#000000dd", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", zIndex: 200 }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{ background: "#0e0e0e", border: "1px solid #2a2a2a", borderRadius: "4px", padding: "36px 32px", width: "100%", maxWidth: "560px", maxHeight: "90vh", overflowY: "auto" }}
          >
            {/* Fechar */}
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "24px" }}>
              <button onClick={() => setShowAbout(false)} style={{ background: "none", border: "none", color: "#333", fontFamily: "'Courier Prime', monospace", fontSize: "16px", cursor: "pointer", lineHeight: 1 }}>×</button>
            </div>

            {/* Gancho */}
            <div style={{ fontFamily: "'IM Fell English', serif", fontSize: "18px", color: "#c8c8c8", lineHeight: "1.7", marginBottom: "24px", fontStyle: "italic" }}>
              As perguntas chegaram.<br />As respostas são suas.
            </div>

            {/* Corpo */}
            <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "13px", color: "#555", lineHeight: "1.9", marginBottom: "28px" }}>
              <p style={{ marginBottom: "16px" }}>
                Este app é uma camada do método IHIA — Inteligência Humana Integrada à Artificial. Ele questiona. O livro estrutura.
              </p>
              <p style={{ marginBottom: "16px" }}>
                Cinco frameworks originais formam o ecossistema completo. Aqui você encontrou três deles operando sobre o seu pensamento. Os outros dois — P.R.E.C.I.S.O. e P.A.R.E.D.E. — ensinam como instruir a IA com a mesma precisão que você acabou de aplicar a si mesmo.
              </p>
              <p>
                O método não depende de ferramentas. Depende de raciocínio estruturado, decisão consciente e linguagem precisa.
              </p>
            </div>

            {/* Divisor — Livro */}
            <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: "24px", marginBottom: "24px" }}>
              <div style={{ fontFamily: "'IM Fell English', serif", fontSize: "16px", color: "#888", marginBottom: "4px" }}>
                IA Profissional
              </div>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "11px", color: "#444", lineHeight: "1.7", marginBottom: "16px" }}>
                Do Marco Zero ao Especialista<br />
                De Prompt a Protagonismo IHIA
              </div>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "11px", color: "#888", letterSpacing: "0.04em", marginBottom: "4px" }}>
                Lin X · 2026
              </div>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "10px", color: "#333", lineHeight: "1.9", marginBottom: "20px" }}>
                Brochura 978-65-01-90795-6<br />
                Ebook 978-65-01-90794-9
              </div>

              {/* Botão — Ver livro */}
              <div style={{ marginBottom: "8px" }}>
                <a
                  href="https://clubedeautores.com.br/livro/ia-profissional-do-marco-zero-ao-especialista"
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{ display: "inline-block", border: "1px solid #444", borderRadius: "2px", padding: "8px 20px", fontFamily: "'Courier Prime', monospace", fontSize: "11px", color: "#c8c8c8", letterSpacing: "0.1em", textTransform: "uppercase", textDecoration: "none", transition: "all .2s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "#888"; e.currentTarget.style.color = "#ffffff"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "#444"; e.currentTarget.style.color = "#c8c8c8"; }}
                >
                  ver livro no site oficial
                </a>
              </div>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "9px", color: "#555", letterSpacing: "0.08em" }}>
                Você será redirecionado para um site externo.
              </div>
            </div>

            {/* Divisor — Privacidade e isenção */}
            <div style={{ borderTop: "1px solid #141414", paddingTop: "20px" }}>
              <div style={{ fontFamily: "'Courier Prime', monospace", fontSize: "9px", color: "#555", lineHeight: "1.9", letterSpacing: "0.04em" }}>
                <div style={{ marginBottom: "10px" }}>
                  ◆ Este aplicativo não coleta, armazena ou compartilha dados pessoais. Todo o conteúdo permanece exclusivamente no dispositivo do usuário.
                </div>
                <div style={{ marginBottom: "10px" }}>
                  ◆ O conteúdo é fornecido "como está", sem garantias de qualquer natureza. As perguntas têm finalidade reflexiva e não substituem acompanhamento profissional de saúde mental.
                </div>
                <div>
                  ◆ Desenvolvido por Lin X · Baseado no livro <span style={{ fontStyle: "italic" }}>IA Profissional</span> · 2026
                </div>
                <div style={{ marginTop: "10px", paddingTop: "10px", borderTop: "1px solid #141414", color: "#333", fontSize: "9px", letterSpacing: "0.1em" }}>
                  Versão 1.0.0
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(IHIAApp));

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .then(function(r) { console.log('SW ativo:', r.scope); })
          .catch(function(e) { console.log('SW requer HTTPS:', e.message); });
      });
    }
  </script>
</body>
